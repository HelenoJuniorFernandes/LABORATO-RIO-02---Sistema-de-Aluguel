micronaut:
  application:
    name: rental-system
  server:
    port: ${PORT:8080}
    
  # Configurações do Micronaut Security
  security:
    authentication: session
    redirect:
      enabled: true
      unauthorized:
        url: /login
      login-success: /
      login-failure: /login?error=true
      logout: /login?logout=true
    endpoints:
      login:
        enabled: true
      logout:
        enabled: true
        get-allowed: true
    # Regras de proteção de rotas (substitui o antigo SecurityConfig do Spring)
    intercept-url-map:
      - pattern: /css/**
        http-method: GET
        access:
          - isAnonymous()
          - isAuthenticated()
      - pattern: /img/**
        http-method: GET
        access:
          - isAnonymous()
          - isAuthenticated()

# Configurações do Banco de Dados H2
datasources:
  default:
    jdbc-url: "jdbc:h2:mem:rentalsystemdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driverClassName: org.h2.Driver
    username: sa
    password: password
    dialect: H2

# Configurações do Hibernate / JPA
jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: create
          import_files: data.sql