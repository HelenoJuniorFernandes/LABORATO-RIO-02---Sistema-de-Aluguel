micronaut:
  application:
    name: rental-system
  server:
    port: ${PORT:8082}

  views:
    thymeleaf:
      cache: false
    
  router:
    static-resources:
      default:
        paths: ["classpath:static"]
        mapping: "/**"

  # Configurações do Micronaut Security
  security:
    authentication: cookie
    token:
      jwt:
        signatures:
          secret:
            generator:
              secret: "chaveSecretaMuitoForteParaOJWTDeAluguel123456"
    redirect:
      enabled: true
      unauthorized:
        url: /login
      login-success: /
      login-failure: /login?error=true
      logout: /login?logout=true
    endpoints:
      login:
        enabled: true
      logout:
        enabled: true
        get-allowed: true
    # Regras de proteção de rotas (substitui o antigo SecurityConfig do Spring)
    intercept-url-map:
      - pattern: /css/**
        http-method: GET
        access:
          - isAnonymous()
          - isAuthenticated()
      - pattern: /img/**
        http-method: GET
        access:
          - isAnonymous()
          - isAuthenticated()

# Configurações do Banco de Dados H2
datasources:
  default:
    jdbc-url: "jdbc:h2:mem:rentalsystemdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER,PASSWORD"
    driverClassName: org.h2.Driver
    username: sa
    password: password
    dialect: H2

# Configurações do Hibernate / JPA
jpa:
  default:
    packages-to-scan:
      - 'com.pucminas.rental_system.model'
    properties:
      hibernate:
        hbm2ddl:
          auto: create
      jakarta.persistence.sql-load-script-source: "data.sql"